name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/Snake.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: gokuloverseeker
          outputs: |
            dist/github-snake.svg?color_snake=#e23636&color_dots=#161b22,#4c1518,#7f1d1d,#b91c1c,#f87171
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#ff3131&color_dots=#0d1117,#401016,#7f1d1d,#dc2626,#fca5a5

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update contribution snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
